# Open Persona — production Docker Compose (Spec 11, T10)
# Single VPS deploy: API + Postgres+pgvector co-located, single uvicorn worker.
# Copy this file + .env.production + bootstrap.sh to the VPS, then:
#   docker compose -f docker-compose.production.yml up -d
#   ./bootstrap.sh            # creates persona_app role, runs alembic, grants privileges
# Migrations are NOT auto-run on startup (spec 07, §7) — bootstrap.sh is idempotent
# and is the one-shot first-boot script. Re-run after migration bumps; it handles
# upgrade head + leaves default privileges in place so new tables inherit grants.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: persona
    volumes:
      - persona-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona -d persona"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  api:
    build:
      context: ../packages/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: postgresql+psycopg://persona:${POSTGRES_PASSWORD}@postgres:5432/persona
      APP_DATABASE_URL: postgresql+psycopg://persona_app:${PERSONA_APP_DB_PASSWORD}@postgres:5432/persona
    ports:
      - "127.0.0.1:8000:8000"   # bind localhost — Caddy/nginx terminates TLS upstream
    volumes:
      - persona-audit:/var/lib/persona
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [internal]

volumes:
  persona-pg-data:
  persona-audit:

networks:
  internal:
