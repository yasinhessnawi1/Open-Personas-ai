name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --all-packages
      - run: uv run ruff check
      - run: uv run ruff format --check
      # Match the local check matrix exactly: strict on core+runtime, standard on api.
      - run: uv run mypy packages/core/src packages/runtime/src --strict
      - run: uv run mypy packages/api/src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --all-packages
      # Default suite (unit + contract). Integration + external are excluded by
      # addopts in pyproject. We have >1000 tests; "no tests collected" is now a
      # real failure (the bootstrap shim is gone).
      - run: uv run pytest

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: persona
          POSTGRES_PASSWORD: persona
          POSTGRES_DB: persona
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --all-packages
      # The integration suite exercises the real embedder
      # (BAAI/bge-small-en-v1.5) — every persona-create touches it via the
      # registry's first-load identity indexing. Without caching, every CI
      # run risks 429 from HF Hub's shared rate limit on GHA IPs (observed
      # mid-deploy on the v0.2 push: 3 tests in test_spec19_verification_
      # surfaces.py failed with HfHubHTTPError 429). Cache keyed by model id
      # so it persists across branches/PRs.
      - name: Cache HuggingFace Hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-v1-bge-small-en-v1.5
      # Warm the embedder cache with retries. On a cache hit the load is
      # instant; on a cache miss (first run after invalidation) we retry with
      # exponential backoff so transient HF 429s don't fail the job. After
      # this step the integration suite's first persona-create finds the model
      # already on disk and never touches the network.
      - name: warm embedder cache (retry HF 429)
        run: |
          for attempt in 1 2 3 4 5; do
            if uv run python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('BAAI/bge-small-en-v1.5')"; then
              echo "embedder warmed (attempt $attempt)"
              exit 0
            fi
            sleep_for=$((attempt * 15))
            echo "embedder warm attempt $attempt failed; sleeping ${sleep_for}s before retry"
            sleep "$sleep_for"
          done
          echo "::error::failed to warm embedder cache after 5 attempts"
          exit 1
      # The RLS tests need a non-superuser role (FORCE RLS bypasses superusers
      # and table owners — D-07-5). Provision `persona_app` so the RLS suite
      # runs instead of skipping.
      - name: provision persona_app role
        env:
          PGPASSWORD: persona
        run: |
          psql -h localhost -U persona -d persona -v ON_ERROR_STOP=1 -c "
            CREATE ROLE persona_app LOGIN PASSWORD 'persona_app' NOSUPERUSER;
          "
      # D-07-1: the store is sync psycopg3 — NOT asyncpg. Match the production DSN.
      - name: pytest -m integration
        env:
          DATABASE_URL: postgresql+psycopg://persona:persona@localhost:5432/persona
          APP_DATABASE_URL: postgresql+psycopg://persona_app:persona_app@localhost:5432/persona
        run: uv run pytest -m integration

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: packages/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      # Spec F2 T02 (D-F2-6): no-hard-coded-design-values gate. Forbids inline
      # colour literals + typography-sizing literals outside the documented
      # allowlist. See packages/web/scripts/no-literals.sh + DESIGN.md.
      - run: pnpm check:no-literals
      # `next build` initialises Clerk at module load; CI placeholders are enough
      # to type-check + bundle. Real keys are required at runtime (deploy env).
      - name: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_CLERK_JWT_TEMPLATE: persona-api
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /personas
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /personas
        run: pnpm build
      - run: pnpm test
      # Playwright e2e is NOT in CI — it needs the live API on :8000 + a real
      # Clerk instance + DeepSeek credits + Docker Postgres. It is a MANUAL
      # pre-tag verification (see LAUNCH_CHECKLIST.md #9).
