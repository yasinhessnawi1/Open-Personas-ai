name: Publish to PyPI

# Publishes persona-core, persona-runtime, persona-voice (in dep order) to PyPI.
# persona-api + persona-web stay private — NOT in scope.
#
# Triggers:
#   - push of a tag matching v*.*.* (e.g. v0.2.0, v0.2.1) — the canonical
#     release path. Push a tag → workflow fires → wheels build + publish.
#   - workflow_dispatch — a manual button in the Actions tab, for re-runs after
#     a partial failure or to re-publish from a fresh build.
#
# NOT triggered on:
#   - push to main — PyPI rejects re-publish of an existing version (400), so
#     this would fail on every commit unless the version bumped per commit.
#   - pull_request — PRs from forks could publish arbitrary code; PyPI publish
#     from PR is a supply-chain attack vector.
#
# One-time setup:
#   1. Generate a project-scoped PyPI API token at
#      https://pypi.org/manage/account/token/ (scope: the three persona-*
#      projects, or All Projects).
#   2. GitHub: Settings → Secrets and variables → Actions → New repository
#      secret named ``PYPI_API_TOKEN``, paste the ``pypi-AgEI...`` value.
#
# Idempotency: ``uv publish --check-url`` queries the PyPI simple index for
# the version-being-uploaded and skips if it already exists — so re-running
# the workflow after a partial failure (e.g. network blip mid-runtime upload)
# resumes from where it left off instead of erroring on the already-published
# packages.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    # Tag-ref guard: a tag push naturally arrives on ``refs/tags/v...``; a
    # manual workflow_dispatch run is only allowed against a ``v*.*.*`` tag.
    # Together this means the publish job CANNOT be triggered from a branch
    # — closes the "compromised account dispatches from a fork-merged
    # malicious commit" path that the bare ``workflow_dispatch:`` opened.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref_type == 'tag'
       && startsWith(github.ref, 'refs/tags/v'))

    # GitHub Environments gate. The ``pypi`` environment is configured in
    # repo Settings -> Environments with ``Required reviewers`` (just you)
    # and ``Deployment branches and tags`` restricted to ``v*.*.*``. Until
    # that environment exists in the UI, this line is a no-op; once it
    # exists, the job pauses for review before publishing — hard gate
    # against accidental publishes or a compromised dispatch.
    environment: pypi

    # Serialize publishes so two near-simultaneous tag pushes can't race to
    # upload the same version. ``cancel-in-progress: false`` because a publish
    # in flight should never be interrupted mid-upload.
    concurrency:
      group: pypi-publish
      cancel-in-progress: false

    permissions:
      # Default GITHUB_TOKEN scope — read only. We're using the PYPI_API_TOKEN
      # secret for the actual publish auth; no PR/issue/contents writes needed.
      contents: read

    steps:
      # Third-party actions are pinned to specific release tags (not @main /
      # @master). The follow-up is to pin to commit SHAs + add Dependabot for
      # deliberate bumps — see the v0.2.x hardening backlog.
      - uses: actions/checkout@v4

      # Pin uv to an exact release rather than ``latest`` so a bad upstream
      # release can't break the publish unexpectedly. Bump deliberately.
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.9"

      # Sync the workspace so uv build can resolve the workspace member graph.
      # ``--no-dev`` keeps the install slim (no pytest/mypy/ruff). All 3
      # packages we publish are runtime-only.
      - name: uv sync (workspace, no dev)
        run: uv sync --all-packages --no-dev

      - name: Build persona-core / runtime / voice
        run: |
          rm -rf dist/
          for pkg in core runtime voice; do
            echo "================ Building persona-$pkg ================"
            (cd "packages/$pkg" && uv build --no-sources --out-dir ../../dist)
          done
          echo ""
          echo "================ Built artefacts ================"
          ls -la dist/

      # Publish in dependency order: core first (runtime declares persona-core,
      # voice declares persona-core[postgres]), so a downstream consumer that
      # races us between the runtime and core publishes still sees a coherent
      # dependency graph. ``--check-url`` makes each step idempotent.
      - name: Publish persona-core
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish \
            --check-url https://pypi.org/simple/persona-core/ \
            dist/persona_core-*.whl \
            dist/persona_core-*.tar.gz

      - name: Publish persona-runtime
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish \
            --check-url https://pypi.org/simple/persona-runtime/ \
            dist/persona_runtime-*.whl \
            dist/persona_runtime-*.tar.gz

      - name: Publish persona-voice
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish \
            --check-url https://pypi.org/simple/persona-voice/ \
            dist/persona_voice-*.whl \
            dist/persona_voice-*.tar.gz

      # Smoke-verify all three landed on PyPI with the expected metadata.
      # ``sleep 5`` gives the PyPI CDN a moment to propagate; the metadata
      # API is usually current within seconds but is not synchronous with
      # the upload acknowledgement.
      - name: Verify all 3 on pypi.org
        run: |
          for pkg in persona-core persona-runtime persona-voice; do
            sleep 5
            echo "--- $pkg ---"
            curl -fsS --max-time 15 "https://pypi.org/pypi/$pkg/json" \
              | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          info = d['info']
          print(f\"  ✓ {info['name']} {info['version']}\")
          print(f\"    license: {info.get('license_expression')}\")
          "
          done
