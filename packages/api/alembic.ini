[alembic]
# %(here)s expands to the absolute directory of alembic.ini, so the path
# resolves correctly regardless of CWD (the alembic CLI otherwise interprets
# a bare ``alembic`` as CWD-relative — README's documented invocation
# ``uv run alembic -c packages/api/alembic.ini upgrade head`` runs from the
# repo root, and CWD-relative breaks that).
script_location = %(here)s/alembic
# Sync psycopg3 dialect (D-07-1/D-07-6). Overridden at runtime by the
# DATABASE_URL env var (env.py); this is the local-dev default.
sqlalchemy.url = postgresql+psycopg://persona:persona@localhost:5432/persona

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
