[alembic]
script_location = alembic
# Sync psycopg3 dialect (D-07-1/D-07-6). Overridden at runtime by the
# DATABASE_URL env var (env.py); this is the local-dev default.
sqlalchemy.url = postgresql+psycopg://persona:persona@localhost:5432/persona

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
