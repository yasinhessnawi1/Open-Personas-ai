[project]
name = "persona-api"
version = "0.1.0"
description = "Hosted FastAPI service for Persona"
requires-python = ">=3.11"
dependencies = [
    "persona-core[postgres]",
    "persona-runtime",
    "fastapi>=0.111,<1",
    "uvicorn[standard]>=0.30,<1",
    "alembic>=1.13,<2",
    "python-jose[cryptography]>=3.3,<4",
    # Spec 13 T10b — Pillow for image downscale + EXIF strip.
    # ``persona-api``-only per D-13-X-pillow (HPND license; ``persona-core``
    # stays Apache-2.0 clean). Used by services/image_service::_maybe_downscale.
    "pillow>=11,<12",
    # Spec 12 T08/T09 — HostedSandbox (E2B Code Interpreter SDK, D-12-12
    # substrate) backs the production `code_execution` tool. DIRECT dep, not an
    # optional extra: persona-api is the hosted service, the only thing that
    # installs it is the Fly deploy, and that deploy selects the E2B backend
    # whenever E2B_API_KEY is set (app.py `_e2b_api_key_present()`). The prod
    # Dockerfile's `uv sync --all-packages --no-dev` installs direct deps but
    # NOT optional extras — so as an extra the SDK was never installed in prod,
    # and code_execution failed with SandboxUnavailableError(reason=sdk_missing).
    # Still lazy-imported at the use-site, so dev/no-key environments boot
    # cleanly with the tool simply absent (D-12-5 no degraded fallback).
    "e2b-code-interpreter>=1.0,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persona_api"]

[tool.uv.sources]
persona-core = { workspace = true }
persona-runtime = { workspace = true }
