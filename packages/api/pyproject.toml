[project]
name = "persona-api"
version = "0.1.0"
description = "Hosted FastAPI service for Persona"
requires-python = ">=3.11"
dependencies = [
    "persona-core[postgres]",
    "persona-runtime",
    "fastapi>=0.111,<1",
    "uvicorn[standard]>=0.30,<1",
    "alembic>=1.13,<2",
    "python-jose[cryptography]>=3.3,<4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persona_api"]
