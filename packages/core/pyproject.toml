[project]
name = "persona-core"
version = "0.1.0"
description = "Open-source library for building AI personas with typed memory"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
dependencies = [
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "chromadb>=1.0,<2",
    "sentence-transformers>=3.0,<4",
    "typer>=0.12,<1",
    "pyyaml>=6.0,<7",
    "httpx>=0.27,<1",
    "tiktoken>=0.7,<1",
    "loguru>=0.7,<1",
    "anthropic>=0.30,<1",
    "openai>=1.30,<2",
    "trafilatura>=2.0,<3",
    "mcp>=1.0,<2",
    # Spec 15 T07 FalImageBackend — fal.ai Python SDK for the Flux 1.1
    # [pro] image-generation backend (D-15-1). Apache-2.0; transitive
    # surface (httpx, httpx-sse, websockets, asyncstdlib, msgpack,
    # aiofiles) all MIT/BSD/Apache per D-15-X-license-stack. The
    # backend module lazy-imports ``fal_client`` inside ``__init__`` so
    # ``persona.imagegen`` stays importable on a minimal install; the
    # dep is pinned tight (``>=1.0,<2``) because the 0.x → 1.0 SDK
    # transition was breaking and a 1.x → 2.x bump may follow
    # (research §6).
    "fal-client>=1.0,<2",
    # Spec 15 T09 — categorical hard-line filter. The ``regex`` package
    # provides full Unicode property classes (``\p{L}``, ``\p{Mn}``)
    # needed for confusable-fold tokenisation across non-Latin scripts
    # (Cyrillic, Greek, fullwidth digits, mathematical-alphanumeric
    # range). MIT-class (PSF) licensed; zero transitive surface; clean
    # for the Apache-2.0 stack per D-15-X-license-stack.
    "regex>=2024.0,<2027",
]

[project.optional-dependencies]
local = [
    "torch>=2.3,<3",
    "transformers>=4.42,<5",
    "bitsandbytes>=0.43,<1",
    "accelerate>=0.31,<1",
]
postgres = [
    "psycopg[binary]>=3.1,<4",
    "sqlalchemy>=2.0,<3",
    "pgvector>=0.3,<1",
]
# Spec 12 T05 LocalDockerSandbox — docker SDK pulled here, NOT in the base
# install (D-12-5 + spec-12 kickoff: "users who only use the hosted sandbox
# via the API don't need it"). The module lazy-imports docker so it stays
# importable on a minimal `pip install persona-core` and raises
# SandboxUnavailableError at construction when the SDK is absent.
sandbox = [
    "docker>=7,<8",
]
# Spec 16 T01 — pypdf as a host-side test-only dependency for the §3.7 PDF
# inspection asserts in T11/T14 (PdfReader.pages count, page text extraction,
# /Resources/XObject walk). NOT in the Spec 12 sandbox image manifest — never
# imported by persona-core / persona-runtime code paths inside the sandbox.
# Pin range matches the workspace dev group (`pypdf>=6.0,<7` added by Spec 14
# T21 for the pypdfium2-aligned PDF parser) so `uv sync` resolves a single
# version across the workspace.
test = [
    "pypdf>=6.0,<7",
]

[project.scripts]
persona = "persona.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persona"]
# Hatchling includes all files under the listed packages by default, which
# covers the bundled SKILL.md packs (web_research / document_drafting /
# docx_generation / pptx_generation / xlsx_generation / pdf_generation) +
# their `supplements/*.md` files (Spec 16 M1a mode — supplements ship as
# installed package data alongside SKILL.md, read from disk at runtime
# via `SkillSpec.path` per D-16-2-path). The explicit include below
# regression-guards against any future change to hatch's default file
# filter that might strip non-Python assets from the wheel.
include = [
    "src/persona/py.typed",
    "src/persona/skills/builtin/**/SKILL.md",
    "src/persona/skills/builtin/**/supplements/*.md",
]
