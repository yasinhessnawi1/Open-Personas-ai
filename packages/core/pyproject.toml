[project]
name = "persona-core"
version = "1.0.0"
description = "Build AI personas with typed memory and tier-routed model selection."
readme = "README.md"
requires-python = ">=3.11"
# MIT — the open-source engine (Spec 33). Free for any use, including
# commercial. The application layer (persona-api / persona-web) is separately
# licensed PolyForm-Noncommercial-1.0.0 (source-available, noncommercial).
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Yasin Hessnawi", email = "yasinhessnawi1@gmail.com" },
]
keywords = [
    "ai",
    "persona",
    "agent",
    "llm",
    "typed-memory",
    "rag",
    "pgvector",
    "agentic",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "chromadb>=1.0,<2",
    "sentence-transformers>=3.0,<4",
    "typer>=0.12,<1",
    "pyyaml>=6.0,<7",
    "httpx>=0.27,<1",
    "tiktoken>=0.7,<1",
    "loguru>=0.7,<1",
    "anthropic>=0.30,<1",
    "openai>=1.30,<2",
    "trafilatura>=2.0,<3",
    "mcp>=1.0,<2",
    # Spec 15 T07 FalImageBackend — fal.ai Python SDK for the Flux 1.1
    # [pro] image-generation backend (D-15-1). Apache-2.0; transitive
    # surface (httpx, httpx-sse, websockets, asyncstdlib, msgpack,
    # aiofiles) all MIT/BSD/Apache per D-15-X-license-stack. The
    # backend module lazy-imports ``fal_client`` inside ``__init__`` so
    # ``persona.imagegen`` stays importable on a minimal install; the
    # dep is pinned tight (``>=1.0,<2``) because the 0.x → 1.0 SDK
    # transition was breaking and a 1.x → 2.x bump may follow
    # (research §6).
    "fal-client>=1.0,<2",
    # Spec 15 T09 — categorical hard-line filter. The ``regex`` package
    # provides full Unicode property classes (``\p{L}``, ``\p{Mn}``)
    # needed for confusable-fold tokenisation across non-Latin scripts
    # (Cyrillic, Greek, fullwidth digits, mathematical-alphanumeric
    # range). MIT-class (PSF) licensed; zero transitive surface; clean
    # for the Apache-2.0 stack per D-15-X-license-stack.
    "regex>=2024.0,<2027",
    # Spec V1 T03 — JWT verifier extraction (D-V1-X-jwt-verifier-extraction).
    # Relocated from packages/api/pyproject.toml so persona-voice can consume
    # `persona.auth.jwt_verifier` without taking a persona-api dependency.
    # persona-jose ships the algorithm-confusion-hardened JWT decode surface
    # the spec 08 T05 security-reviewer pass locked. No new transitive surface
    # vs the prior persona-api-only install (jose was already pulled in via
    # the workspace dep chain).
    "python-jose[cryptography]>=3.3,<4",
    # Spec 26 T02 — the ``datetime`` built-in tool resolves IANA timezones via
    # stdlib ``zoneinfo``, which reads the OS tz database and falls back to the
    # PyPI ``tzdata`` package only when it is installed. Slim/distroless/Alpine
    # container images (and Windows) ship no ``/usr/share/zoneinfo`` → an
    # unguarded ``ZoneInfo("Europe/Oslo")`` raises ``ZoneInfoNotFoundError``.
    # ``tzdata`` is pure data, zero-code, zero transitive deps, CPython-core
    # maintained — it makes timezone behaviour deterministic across platforms.
    # (R-26-2 / D-26-X-launch-deps.)
    "tzdata>=2024.1",
    # Spec 26 T05 — the ``json_query`` built-in tool runs JMESPath queries over
    # JSON. ``jmespath`` is pure Python with ZERO transitive dependencies (the
    # AWS-CLI query language); lighter than ``jsonpath-ng`` (pulls ``ply``).
    # (R-26-2 / D-26-X-launch-deps.)
    "jmespath>=1.0,<2",
    # Spec 26 T03 — the ``regex_match`` built-in tool runs MODEL-supplied
    # patterns, which are effectively untrusted: catastrophic backtracking
    # (ReDoS) triggers on short inputs, so an input-length cap is NOT a
    # sufficient guard, and Python ``re`` has no async-safe way to time out a
    # runaway match (signal.alarm is main-thread/Unix-only; a worker thread
    # cannot stop the CPU burn). ``google-re2`` uses a linear-time automaton —
    # ReDoS-immune by construction — so the tool needs no timeout machinery.
    # C++ extension via pybind11; ZERO Python transitive deps; binary wheels
    # for Linux + macOS (x86_64/aarch64). Un-defers the re2 escalation named in
    # R-26-2 / D-26-X-regex-trust-model (see D-26-X-regex-re2-undefer). Trade:
    # no backreferences/lookaround — acceptable for a match/find/replace tool.
    "google-re2>=1.1,<2",
]

[project.optional-dependencies]
local = [
    "torch>=2.3,<3",
    "transformers>=4.42,<5",
    "bitsandbytes>=0.43,<1",
    "accelerate>=0.31,<1",
]
postgres = [
    "psycopg[binary]>=3.1,<4",
    "sqlalchemy>=2.0,<3",
    "pgvector>=0.3,<1",
]
# Spec K0 T7 (D-K0-6/7) — turbovec is the OPTIONAL quantized in-RAM dense index for
# the knowledge graph. NEVER a hard dependency: lazy-imported, env-selected
# (PERSONA_GRAPH_INDEX_BACKEND=turbovec), with pgvector the default + only wired
# prod path. Pinned >=0.8.0 for the x86 scalar-fallback correctness fix (research
# §6); tight upper bound for the alpha on-disk-format churn. MIT; numpy-only tree.
turbovec = [
    "turbovec>=0.8.0,<0.9",
]
# Spec 12 T05 LocalDockerSandbox — docker SDK pulled here, NOT in the base
# install (D-12-5 + spec-12 kickoff: "users who only use the hosted sandbox
# via the API don't need it"). The module lazy-imports docker so it stays
# importable on a minimal `pip install persona-core` and raises
# SandboxUnavailableError at construction when the SDK is absent.
sandbox = [
    "docker>=7,<8",
]
# Spec 16 T01 — pypdf as a host-side test-only dependency for the §3.7 PDF
# inspection asserts in T11/T14 (PdfReader.pages count, page text extraction,
# /Resources/XObject walk). NOT in the Spec 12 sandbox image manifest — never
# imported by persona-core / persona-runtime code paths inside the sandbox.
# Pin range matches the workspace dev group (`pypdf>=6.0,<7` added by Spec 14
# T21 for the pypdfium2-aligned PDF parser) so `uv sync` resolves a single
# version across the workspace.
test = [
    "pypdf>=6.0,<7",
]

[project.scripts]
persona = "persona.cli.main:app"

[project.urls]
Homepage = "https://github.com/yasinhessnawi1/Open-Persona"
Repository = "https://github.com/yasinhessnawi1/Open-Persona"
Issues = "https://github.com/yasinhessnawi1/Open-Persona/issues"
Changelog = "https://github.com/yasinhessnawi1/Open-Persona/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persona"]
# Hatchling includes all files under the listed packages by default, which
# covers the bundled SKILL.md packs (web_research / data_analysis /
# document_generation / code_review) + their `supplements/*.md` and
# `templates/*.md` files (Spec 16 M1a mode — bundled assets ship as
# installed package data alongside SKILL.md, read from disk at runtime
# via `SkillSpec.path` per D-16-2-path). Spec 24 (D-24-1) collapses the 5
# document-format packs into the one `document_generation` skill. The
# explicit include below regression-guards against any future change to
# hatch's default file filter that might strip non-Python assets.
include = [
    "src/persona/py.typed",
    "src/persona/skills/catalog.toml",
    "src/persona/skills/builtin/**/SKILL.md",
    "src/persona/skills/builtin/**/supplements/*.md",
    "src/persona/skills/builtin/**/templates/*.md",
    # Spec 27 (D-27-1) — declarative built-in MCP server catalog.
    "src/persona/tools/mcp/catalog.toml",
]
