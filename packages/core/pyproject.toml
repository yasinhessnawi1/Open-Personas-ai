[project]
name = "persona-core"
version = "0.1.0"
description = "Open-source library for building AI personas with typed memory"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
dependencies = [
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "chromadb>=1.0,<2",
    "sentence-transformers>=3.0,<4",
    "typer>=0.12,<1",
    "pyyaml>=6.0,<7",
    "httpx>=0.27,<1",
    "tiktoken>=0.7,<1",
    "loguru>=0.7,<1",
]

[project.optional-dependencies]
local = [
    "torch>=2.3,<3",
    "transformers>=4.42,<5",
    "bitsandbytes>=0.43,<1",
    "accelerate>=0.31,<1",
]
postgres = [
    "asyncpg>=0.29,<1",
    "sqlalchemy[asyncio]>=2.0,<3",
    "pgvector>=0.3,<1",
]

[project.scripts]
persona = "persona.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persona"]
