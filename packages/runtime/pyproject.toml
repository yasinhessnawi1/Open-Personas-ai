[project]
name = "persona-runtime"
version = "0.1.0"
description = "Generation loop, router, and agentic engine for Persona"
requires-python = ">=3.11"
dependencies = [
    "persona-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persona_runtime"]
